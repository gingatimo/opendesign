<a href="#main-content" class="docs-skip-link">Bỏ qua tới nội dung chính</a>

<!--
  Task 2 (viết lại): bỏ hẳn topbar full-width — sidebar giờ full-height, tự chứa logo. Header +
  toggle chung một hàng (.g-sidebar__top) là cơ chế Task 1 tự gộp, xem sidebar.ts — chỉ cần đặt
  cả hai bên trong <g-sidebar>, không cần bọc thêm gì. Không dùng [(collapsed)]: GSidebarToggle
  tự đọc/đổi collapsed() nội bộ của GSidebar (model signal), app.ts không cần biết trạng thái này.
-->
<g-sidebar>
  <a gSidebarHeader routerLink="/" class="docs-brand">OpenDesign</a>
  <g-sidebar-toggle />
  <nav aria-label="Điều hướng chính" class="docs-nav">
    @for (group of navGroups; track group.title) {
      <div class="docs-nav-group">
        <div class="docs-nav-group__title">{{ group.title }}</div>
        @for (link of group.links; track link.path) {
          <a
            g-sidebar-item
            [routerLink]="link.path"
            routerLinkActive="g-active"
            ariaCurrentWhenActive="page"
            [routerLinkActiveOptions]="{ exact: link.exact ?? false }"
          >
            <g-icon gSidebarItemIcon [icon]="navGlyph(link.icon)" />
            <span gSidebarItemLabel>{{ link.label }}</span>
          </a>
        }
      </div>
    }
  </nav>
</g-sidebar>

<main id="main-content" tabindex="-1" class="docs-main">
  <div class="docs-main__inner">
    <router-outlet />
  </div>
</main>

<!-- Nút theme nổi góc phải trên (vị trí "hiện tại" người dùng chốt) — không còn topbar để đặt
  cùng hàng với logo nên tách riêng thành phần tử position: fixed, xem app.scss. -->
<button
  class="docs-theme-toggle"
  g-icon-button
  aria-label="Đổi giao diện sáng/tối"
  (click)="themeService.toggle()"
>
  @if (themeService.theme() === 'light') {
    <g-icon [icon]="iconMoon" />
  } @else {
    <g-icon [icon]="iconSun" />
  }
</button>
