name: Deploy docs to Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ cho phép một lần deploy chạy cùng lúc — bỏ qua các lần được xếp hàng giữa lần đang chạy
# và lần mới nhất, nhưng KHÔNG hủy lần đang chạy (để deploy production luôn hoàn tất trọn vẹn).
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/configure-pages@v6
      - run: npm ci
      - run: npx ng build docs --base-href /opendesign/
      # SPA dùng client-side routing — copy index.html thành 404.html để GitHub Pages phục vụ
      # đúng app (thay vì trang 404 mặc định) khi người dùng refresh/vào thẳng một route con.
      - run: cp dist/docs/browser/index.html dist/docs/browser/404.html
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/docs/browser

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
